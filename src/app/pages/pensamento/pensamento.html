<div [class]="larguraPensamento()">
    <img [src]="img()" alt="Aspas coloridas">
    <p class="conteudo">{{ pensamento.conteudo }}</p>
    <p class="autoria"><b>{{ pensamento.autoria }}</b></p>
    <div class="acoes">
        <button class="botao-editar" [routerLink]="['/editarPensamento', pensamento.id]">
            <img src="/imagens/icone-editar.png" alt="Ícone de editar">
        </button>
        <button class="botao-excluir" [routerLink]="['/excluirPensamento', pensamento.id]">
            <img src="/imagens/icone-excluir.png" alt="Ícone de excluir">
        </button>
    </div>
</div>
